<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyMe - Fintech Onboarding</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wizard-container">
        <div class="brand-header">
            <div class="brand-logo">VerifyMe</div>
            <div class="brand-subtext">Open your account — it takes about 3 minutes</div>
        </div>

        <input type="radio" name="step-state" id="step1-trigger" checked hidden>
        <input type="radio" name="step-state" id="step2-trigger" hidden>
        <input type="radio" name="step-state" id="step3-trigger" hidden>

        <div class="step-tracker">
            <label for="step1-trigger" class="step-item step1-label">1 • Identity</label>
            <label for="step2-trigger" class="step-item step2-label">2 • Address & Income</label>
            <label for="step3-trigger" class="step-item step3-label">3 • Documents</label>
        </div>

        <form action="#" method="POST">
            
            <div class="form-step" id="step-identity">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="fullName" placeholder="Full legal name">
                    <label for="fullName">Full legal name</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="emailAddress" placeholder="Email address">
                    <label for="emailAddress">Email address</label>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold mb-1">Mobile number</label>
                    <div class="input-group has-prefix">
                        <span class="input-group-text">+91</span>
                        <input type="tel" class="form-control py-2" placeholder="10-digit mobile">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold mb-1">PAN</label>
                    <div class="input-group has-prefix">
                        <span class="input-group-text">
                            <span style="display:inline-block; width:16px; height:11px; border:1px solid #495057; border-radius:1px; position:relative;">
                                <span style="position:absolute; top:2px; left:2px; width:4px; height:3px; background:#495057;"></span>
                            </span>
                        </span>
                        <input type="text" class="form-control text-uppercase py-2" placeholder="ABCDE1234F">
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <button type="button" class="btn btn-light-custom rounded shadow-sm" disabled>Back</button>
                    <label for="step2-trigger" class="btn btn-primary-custom rounded shadow-sm">Continue</label>
                </div>
            </div>

            <div class="form-step" id="step-address">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold mb-1">State</label>
                    <select class="form-select py-2">
                        <option selected>Select State</option>
                        <option>Uttar Pradesh</option>
                        <option>Delhi</option>
                        <option>Maharashtra</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold mb-1">Address Textarea</label>
                    <textarea class="form-control" rows="3" placeholder="Enter your full permanent address"></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold mb-1">Income Slider</label>
                    <input type="range" class="form-range" min="0" max="100" step="10">
                    <div class="text-muted small mt-1">Live ₹ read-out range</div>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <label for="step1-trigger" class="btn btn-light-custom rounded shadow-sm">Back</label>
                    <label for="step3-trigger" class="btn btn-primary-custom rounded shadow-sm">Continue</label>
                </div>
            </div>

            <div class="form-step" id="step-documents">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold mb-1">ID Type</label>
                    <div class="p-2 border rounded bg-light">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="idType" id="aadhaar" checked>
                            <label class="form-check-label" for="aadhaar">Aadhaar</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="idType" id="passport">
                            <label class="form-check-label" for="passport">Passport</label>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold mb-1">File Input</label>
                    <input class="form-control" type="file">
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="consent" required>
                    <label class="form-check-label small" for="consent">
                        I hereby give my consent for KYC validation.
                    </label>
                </div>

                <div class="form-check form-switch mb-4">
                    <input class="form-check-input" type="checkbox" id="marketing">
                    <label class="form-check-label small" for="marketing">Receive updates on WhatsApp</label>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <label for="step2-trigger" class="btn btn-light-custom rounded shadow-sm">Back</label>
                    <button type="submit" class="btn btn-success rounded shadow-sm px-4">Submit</button>
                </div>
            </div>

        </form>

        <div class="security-note">
            🔒 Bank-grade encryption - your data is never sold
        </div>
    </div>

</body>
</html>
